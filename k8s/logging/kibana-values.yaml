# =============================================================
# k8s/logging/kibana-values.yaml
# Конфигурация Kibana — веб-интерфейс для поиска логов
#
# ПОСЛЕ УСТАНОВКИ:
#   1. Открыть http://<NODE_IP>:30056
#   2. Stack Management → Index Patterns → Create index pattern
#   3. Pattern: fluentd-*  |  Time field: @timestamp
#   4. Discover → выбрать fluentd-*
#   5. Фильтровать: kubernetes.namespace_name : staging
# =============================================================

imageTag: "8.14.0"

# Kibana подключается к Elasticsearch по имени Service
elasticsearchHosts: "http://elasticsearch-master:9200"

# Порт доступа снаружи кластера
service:
  type: NodePort
  nodePort: 30056

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

kibanaConfig:
  kibana.yml: |
    server.host: "0.0.0.0"
    server.name: "kibana-devtracker"

    # Адрес Elasticsearch (имя K8s Service)
    elasticsearch.hosts: ["http://elasticsearch-master:9200"]

    # Включить более подробное логирование
    logging.verbose: false

    # Язык интерфейса
    i18n.locale: "en"

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 10
