# =============================================================
# k8s/logging/kibana-values.yaml — v5 (performance tuning)
#
# ПРОБЛЕМА: на нодах 6Gi RAM Kibana потребляла 483m CPU и вызывала
# event loop delay до 13522ms из-за taskManager и background jobs.
#
# ИЗМЕНЕНИЯ v5:
#   1. CPU limit увеличен до 1000m — Kibana Node.js однопоточный,
#      ему нужен один полный CPU для нормальной работы.
#   2. xpack.task_manager.max_workers: 2 — по умолчанию 10,
#      каждый worker опрашивает ES. На слабом железе это убивает.
#   3. xpack.task_manager.poll_interval: 10000 — опрос раз в 10с
#      вместо 3с по умолчанию. Снижает I/O на ES в разы.
#   4. monitoring.kibana.collection.enabled: false — отключает
#      сбор метрик самой Kibana (нам не нужно, у нас Prometheus).
#   5. elasticsearch.ssl.certificateAuthorities: es-master-ca.crt
#      (исправлено с v4 — теперь правильный CA от chart'а ES).
# =============================================================

imageTag: "8.5.1"

elasticsearchHosts: "https://elasticsearch-master:9200"

service:
  type: NodePort
  nodePort: 30056

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"       # увеличено: Node.js нужен 1 CPU
    memory: "2Gi"

# ── Только ключи шифрования — без credentials ─────────────────
extraEnvs:
  - name: KIBANA_ENCRYPTION_KEY
    valueFrom:
      secretKeyRef:
        name: kibana-encryption-keys
        key: encryptionKey
  - name: KIBANA_SAVEDOBJECTS_KEY
    valueFrom:
      secretKeyRef:
        name: kibana-encryption-keys
        key: encryptedSavedObjects
  - name: KIBANA_REPORTING_KEY
    valueFrom:
      secretKeyRef:
        name: kibana-encryption-keys
        key: reportingEncryptionKey

# ── TLS сертификат для проверки Elasticsearch ─────────────────
secretMounts:
  - name: elasticsearch-tls
    secretName: elasticsearch-tls
    path: /usr/share/kibana/config/tls
    defaultMode: 0400

# ── Конфигурация Kibana ───────────────────────────────────────
kibanaConfig:
  kibana.yml: |
    server.host: "0.0.0.0"
    server.name: "kibana-devtracker"

    # ── Elasticsearch ────────────────────────────────────────
    elasticsearch.hosts: ["https://elasticsearch-master:9200"]

    # CA сертификат — правильный CA от Elastic Helm chart
    elasticsearch.ssl.certificateAuthorities:
      - /usr/share/kibana/config/tls/es-master-ca.crt
    elasticsearch.ssl.verificationMode: certificate

    # ── Безопасность ─────────────────────────────────────────
    xpack.encryptedSavedObjects.encryptionKey: "${KIBANA_SAVEDOBJECTS_KEY}"
    xpack.security.encryptionKey: "${KIBANA_ENCRYPTION_KEY}"
    xpack.reporting.encryptionKey: "${KIBANA_REPORTING_KEY}"

    xpack.security.session.idleTimeout: "8h"
    xpack.security.session.lifespan: "30d"

    # ── Performance tuning для слабого железа ────────────────
    # taskManager по умолчанию 10 workers × опрос каждые 3с —
    # это десятки запросов в секунду к ES и причина 13s event loop delay
    xpack.task_manager.max_workers: 2
    xpack.task_manager.poll_interval: 10000

    # Отключаем встроенный мониторинг — у нас Prometheus
    monitoring.kibana.collection.enabled: false
    monitoring.ui.enabled: false

    # ── Разное ───────────────────────────────────────────────
    i18n.locale: "en"
    telemetry.enabled: false
    telemetry.optIn: false

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 10
