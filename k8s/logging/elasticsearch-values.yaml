# =============================================================
# k8s/logging/elasticsearch-values.yaml
# Конфигурация Elasticsearch — Security Edition v7
#
# ИСПРАВЛЕНИЕ v7:
#   transport.ssl — убраны keystore.path и truststore.path.
#   ES не позволяет смешивать PEM (certificate/key) и keystore
#   в одной SSL-секции. Используем только PEM для обоих:
#   HTTP и transport.
#
#   Для transport verification_mode: certificate достаточно —
#   ноды доверяют друг другу по общему CA-сертификату.
# =============================================================

replicas: 2
imageTag: "8.5.1"

roles:
  - master
  - data
  - ingest

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "3Gi"

esJavaOpts: "-Xmx1g -Xms1g"

esConfig:
  elasticsearch.yml: |
    cluster.name: "devtracker-logs"
    cluster.initial_master_nodes:
      - "elasticsearch-master-0"
      - "elasticsearch-master-1"

    xpack.security.enabled: true

    # ── HTTP TLS (порт 9200) ──────────────────────────────────
    xpack.security.http.ssl.enabled: true
    xpack.security.http.ssl.key: /usr/share/elasticsearch/config/tls/elastic.key
    xpack.security.http.ssl.certificate: /usr/share/elasticsearch/config/tls/elastic.crt
    xpack.security.http.ssl.certificate_authorities:
      - /usr/share/elasticsearch/config/tls/elastic.crt

    # ── Transport TLS (порт 9300, связь между нодами) ─────────
    # Только PEM — нельзя смешивать с keystore.path!
    xpack.security.transport.ssl.enabled: true
    xpack.security.transport.ssl.verification_mode: certificate
    xpack.security.transport.ssl.key: /usr/share/elasticsearch/config/tls/elastic.key
    xpack.security.transport.ssl.certificate: /usr/share/elasticsearch/config/tls/elastic.crt
    xpack.security.transport.ssl.certificate_authorities:
      - /usr/share/elasticsearch/config/tls/elastic.crt

extraVolumes:
  - name: tls-certs
    secret:
      secretName: elasticsearch-tls
      defaultMode: 0440

extraVolumeMounts:
  - name: tls-certs
    mountPath: /usr/share/elasticsearch/config/tls
    readOnly: true

volumeClaimTemplate:
  storageClassName: "local-path"
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: "10Gi"

service:
  type: ClusterIP
  port: 9200

maxUnavailable: 1
