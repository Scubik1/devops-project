# =============================================================
# ansible.cfg — конфигурация Ansible
#
# Этот файл лежит в корне директории ansible/ и автоматически
# подхватывается при запуске ansible-playbook из этой директории.
# =============================================================

[defaults]
# Путь к inventory по умолчанию
inventory = ./inventory/hosts.ini

# Отображать разницу при изменении файлов (как git diff)
diff = True

# Количество параллельных подключений
# 5 достаточно для 3 нод; увеличить для большого кластера
forks = 5

# Не собирать факты автоматически в начале каждой задачи
# (ускоряет выполнение; факты собираются явно там где нужно)
gathering = smart
fact_caching = memory

# Подавить предупреждение об использовании Python интерпретатора
interpreter_python = auto_silent

# Цвет вывода
force_color = True

# Формат вывода результатов (yaml красивее, чем default)
#stdout_callback = yaml
stdout_callback = ansible.builtin.default
# Или просто: stdout_callback = default
result_format = yaml

# Путь к ролям
roles_path = ./roles

# Таймаут SSH-подключения в секундах
timeout = 30

# Повторные попытки подключения (полезно при первом старте ВМ)
[ssh_connection]
pipelining = True
# Pipelining ускоряет выполнение задач за счёт уменьшения
# количества SSH-соединений (важно для задач с sudo)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[privilege_escalation]
become = True            # По умолчанию использовать sudo
become_method = sudo
become_user = root
