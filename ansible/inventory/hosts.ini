# =============================================================
# inventory/hosts.ini — список нод кластера
#
# Ansible читает этот файл чтобы знать, к каким серверам
# подключаться и какие роли им назначить.
#
# АЛЬТЕРНАТИВА: Можно генерировать inventory автоматически
# из Terraform output:
#   terraform output -json all_node_ips | python3 scripts/gen_inventory.py
#
# Синтаксис: <hostname> ansible_host=<IP> [переменные]
# =============================================================

# ── Control-plane нода ─────────────────────────────────────
[control_plane]
k8s-control-plane  ansible_host=192.168.56.10

# ── Worker-ноды ────────────────────────────────────────────
[workers]
k8s-worker-01  ansible_host=192.168.56.11
k8s-worker-02  ansible_host=192.168.56.12

# ── Все ноды кластера (объединяющая группа) ────────────────
# Роли common и containerd применяются ко ВСЕМ нодам
[k8s_cluster:children]
control_plane
workers

# ── Переменные для всех нод ────────────────────────────────
[k8s_cluster:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/k8s_rsa
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
# StrictHostKeyChecking=no отключает ручное подтверждение
# fingerprint при первом подключении. Допустимо для локальной
# среды, но в production лучше управлять known_hosts явно.
