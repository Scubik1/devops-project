# =============================================================
# group_vars/all.yml — переменные для ВСЕХ нод
#
# Здесь хранятся версии компонентов и общие настройки.
# Чтобы обновить K8s — достаточно изменить k8s_version здесь.
# =============================================================

---
# ── Версии компонентов ───────────────────────────────────────
# ВАЖНО: Все три компонента должны иметь одинаковую версию!
# kubelet, kubeadm и kubectl — одна версия.
k8s_version: "1.29"
k8s_full_version: "1.29.0-1.1"   # Точная версия для apt

# containerd
containerd_version: "1.7"

# Версия CNI плагина (Calico) — устанавливается через Helm, не Ansible
calico_version: "3.27.0"

# ── Сетевые настройки ────────────────────────────────────────
# Pod CIDR — диапазон IP для подов (не должен пересекаться с сетью нод)
# Calico по умолчанию ожидает 192.168.0.0/16
pod_network_cidr: "192.168.0.0/16"

# Service CIDR — диапазон для K8s Services
service_cidr: "10.96.0.0/12"

# ── Настройки ядра ────────────────────────────────────────────
# Модули ядра, необходимые для containerd и сети K8s
kernel_modules:
  - overlay       # нужен для overlayfs (слои контейнеров)
  - br_netfilter  # нужен для bridged network traffic в K8s

# Параметры sysctl для K8s сети
sysctl_params:
  net.bridge.bridge-nf-call-iptables:  1   # iptables видит bridged трафик
  net.bridge.bridge-nf-call-ip6tables: 1   # то же для IPv6
  net.ipv4.ip_forward:                 1   # пересылка пакетов между интерфейсами
  vm.max_map_count:                    262144

# ── Временная зона ────────────────────────────────────────────
timezone: "Europe/Moscow"

# ── NTP сервер ────────────────────────────────────────────────
# Синхронизация времени критична для K8s (сертификаты, etcd)
ntp_servers:
  - "0.ru.pool.ntp.org"
  - "1.ru.pool.ntp.org"
