# =============================================================
# templates/frontend-deployment.yaml — Deployment для Nginx/React
# =============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devtracker.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devtracker.frontendLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}

  selector:
    matchLabels:
      {{- include "devtracker.frontendSelectorLabels" . | nindent 6 }}

  strategy:
    type: {{ .Values.frontend.strategy.type }}
    rollingUpdate:
      maxSurge: {{ .Values.frontend.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.frontend.strategy.rollingUpdate.maxUnavailable }}

  template:
    metadata:
      labels:
        {{- include "devtracker.frontendSelectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}

      securityContext:
        # Nginx официальный образ использует uid 101
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true

      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP

          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}

          livenessProbe:
            {{- toYaml .Values.frontend.livenessProbe | nindent 12 }}

          readinessProbe:
            {{- toYaml .Values.frontend.readinessProbe | nindent 12 }}

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
