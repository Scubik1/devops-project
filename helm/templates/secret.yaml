# =============================================================
# templates/secret.yaml — Kubernetes Secrets
#
# Секреты создаются ПЕРВЫМИ, до Deployment и StatefulSet,
# потому что Deployment ссылается на них через envFrom.
#
# ВАЖНО — почему Secret, а не ConfigMap?
#   ConfigMap хранит данные в открытом виде в etcd.
#   Secret хранит данные в base64 (не шифрование, а кодирование!).
#   В production для реального шифрования используют:
#   - Sealed Secrets (шифрование прямо в Git)
#   - HashiCorp Vault (внешнее хранилище секретов)
#   - AWS Secrets Manager / GCP Secret Manager
#
# КАК ПЕРЕДАВАТЬ ЗНАЧЕНИЯ:
#   helm upgrade --install devtracker ./helm \
#     --set backend.secrets.dbPassword="$DB_PASS" \
#     --set backend.secrets.jwtSecret="$JWT_SECRET" \
#     --set postgres.password="$DB_PASS"
# =============================================================

# ── Secret для Backend API ─────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devtracker.backendSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devtracker.backendLabels" . | nindent 4 }}
  annotations:
    # Описание для документации
    description: "Секреты для Backend API (DB password, JWT secret)"
type: Opaque
stringData:
  # stringData позволяет передавать значения в открытом виде —
  # Kubernetes сам конвертирует в base64 при сохранении.
  # Это удобнее чем вручную делать base64.

  DB_PASSWORD: {{ .Values.backend.secrets.dbPassword | required "backend.secrets.dbPassword обязателен при деплое" | quote }}
  JWT_SECRET:  {{ .Values.backend.secrets.jwtSecret  | required "backend.secrets.jwtSecret обязателен при деплое"  | quote }}
---
# ── Secret для PostgreSQL ──────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devtracker.postgresSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devtracker.postgresLabels" . | nindent 4 }}
  annotations:
    description: "Секреты для PostgreSQL StatefulSet"
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | required "postgres.password обязателен при деплое" | quote }}
  # POSTGRES_USER и POSTGRES_DB не являются секретами,
  # но для удобства держим их вместе с паролем
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_DB:   {{ .Values.postgres.database | quote }}
